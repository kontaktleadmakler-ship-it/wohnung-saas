<h1>🏠 V5 CRM Dashboard</h1>

<a href="/logout">Logout</a>

<hr>

<form method="GET">
    Filter Score:
    <input name="score" type="number" placeholder="min score (0-100)">
    <button>Filter</button>
</form>

<hr>

{% for l in leads %}
<div style="border:1px solid #ccc; margin:10px; padding:10px;">

    <b>{{l[1]}}</b><br><br>

    💰 {{l[2]}} €<br>
    🛏 {{l[3]}} Zi<br>
    📏 {{l[4]}} m²<br><br>

    👤 {{l[7]}}<br>
    ⭐ Score: {{l[8]}}<br><br>

    🔗 <a href="{{l[5]}}" target="_blank">Open</a>

</div>
{% endfor %}
