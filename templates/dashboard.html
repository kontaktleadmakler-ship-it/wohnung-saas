<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
</head>
<body>

<h1>Leads Dashboard</h1>

<a href="/logout">Logout</a>

<h3>Filter</h3>
<form method="GET">
    <input name="score" placeholder="Min Score">
    <button type="submit">Filter</button>
</form>

<hr>

{% for lead in leads %}
    <div style="border:1px solid #ccc; padding:10px; margin:10px;">
        <b>{{ lead["name"] }}</b><br>
        {{ lead["email"] }}<br>
        {{ lead["phone"] }}<br>
        Score: {{ lead["score"] }}
    </div>
{% endfor %}

</body>
</html>
