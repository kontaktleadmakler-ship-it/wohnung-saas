<h1>Leads Dashboard</h1>

<a href="/scrape">🔄 Scrape jetzt</a>
<a href="/logout">Logout</a>

<table border="1">
<tr>
    <th>Title</th>
    <th>Price</th>
    <th>Rooms</th>
    <th>Size</th>
    <th>Source</th>
    <th>Customer</th>
    <th>Score</th>
</tr>

{% for l in leads %}
<tr>
    <td><a href="{{ l[5] }}" target="_blank">{{ l[1] }}</a></td>
    <td>{{ l[2] }}</td>
    <td>{{ l[3] }}</td>
    <td>{{ l[4] }}</td>
    <td>{{ l[6] }}</td>
    <td>{{ l[7] }}</td>
    <td>{{ l[8] }}</td>
</tr>
{% endfor %}

</table>
